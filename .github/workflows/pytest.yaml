name: Pytest

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install package
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      ROMS_DOWNLOAD_URL: ${{ secrets.ROMS_DOWNLOAD_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install package
        run: uv sync

      - name: Download ROM
        if: env.ROMS_DOWNLOAD_URL != ''
        run: curl -L -o rom/sfiii3n.zip "$ROMS_DOWNLOAD_URL"

      - name: Run integration tests
        if: env.ROMS_DOWNLOAD_URL != ''
        run: xvfb-run -a uv run pytest tests/integration/
